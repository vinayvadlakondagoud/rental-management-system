<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login | Rental Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.55),
          rgba(0, 0, 0, 0.55)),
        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Roboto, sans-serif;
    }

    .login-wrapper {
      width: 100%;
      max-width: 960px;
      background: #ffffff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0, 0, 0, .35);
      position: relative;
    }

    .login-left {
      background: #111;
      color: #ddd;
      padding: 60px 45px;
    }

    .login-left h2 {
      font-weight: 700;
      color: #ffc107;
    }

    .login-left p {
      font-size: 0.95rem;
      margin-top: 12px;
      color: #bbb;
    }

    .login-left ul {
      padding-left: 18px;
      margin-top: 25px;
      font-size: 0.9rem;
    }

    .login-left li {
      margin-bottom: 10px;
    }

    .login-right {
      padding: 60px 55px;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .form-control {
      height: 46px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .form-control:focus {
      border-color: #ffc107;
      box-shadow: none;
    }

    .btn-primary {
      height: 46px;
      border-radius: 30px;
      font-weight: 700;
      background: #ffc107;
      border: none;
      color: #000;
    }

    .btn-primary:hover {
      background: #ffca2c;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 15px;
      transform: translateY(-50%);
      cursor: pointer;
      color: #6c757d;
    }

    .error-msg {
      display: none;
    }

    .spinner-border {
      width: 1.2rem;
      height: 1.2rem;
    }

    .home-icon {
      position: absolute;
      top: 18px;
      right: 18px;
      color: #000;
      background: #ffc107;
      padding: 8px 12px;
      border-radius: 50%;
      text-decoration: none;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .home-icon:hover {
      background: #ffca2c;
      transform: scale(1.1);
    }


    @media (max-width: 768px) {
      .login-left {
        display: none;
      }

      .login-right {
        padding: 40px 30px;
      }
    }
  </style>
</head>

<body>

  <div class="login-wrapper row g-0">
    <!-- LEFT BRANDING -->
    <div class="col-md-5 login-left d-flex flex-column justify-content-center">
      <h2>Rental Management System</h2>
      <p>
        Manage properties, bookings, and users from one secure platform.
      </p>

      <ul>
        <li>Secure authentication</li>
        <li>Verified listings</li>
        <li>Real-time bookings</li>
        <li>Admin moderation</li>
      </ul>
    </div>

    <!-- RIGHT LOGIN FORM -->
    <div class="col-md-7 login-right">
      <!-- Home Icon -->
      <a href="index.html" class="home-icon" title="Back to Home">
        <i class="bi bi-house-fill"></i>
      </a>

      <h3 class="fw-bold mb-1">Welcome back</h3>
      <p class="text-muted mb-4">Login to continue</p>

      <div class="alert alert-danger error-msg" id="errorBox"></div>

      <form id="loginForm">

        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="mb-3 position-relative">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="showPassword">
            <label class="form-check-label">Show password</label>
          </div>

          <a href="#" class="text-decoration-none">Forgot password?</a>
        </div>

        <button class="btn btn-primary w-100" id="loginBtn">
          <span id="btnText">Login</span>
          <span id="btnLoader" class="spinner-border spinner-border-sm d-none"></span>
        </button>

        <p class="text-center mt-4 mb-0">
          Don’t have an account?
          <a href="register.html" class="fw-semibold text-decoration-none">Create one</a>
        </p>
      </form>
    </div>

  </div>

  <!-- 🔒 JAVASCRIPT UNCHANGED -->
  <script>
    const errorBox = document.getElementById("errorBox");
    const btnText = document.getElementById("btnText");
    const btnLoader = document.getElementById("btnLoader");
    const loginBtn = document.getElementById("loginBtn");
    const showPassword = document.getElementById("showPassword");
    const pwdInput = document.getElementById("password");

    showPassword.addEventListener("change", () => {
      pwdInput.type = showPassword.checked ? "text" : "password";
    });

    function togglePassword() {
      const pwd = document.getElementById("password");
      pwd.type = pwd.type === "password" ? "text" : "password";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      errorBox.style.display = "none";
      btnText.textContent = "Logging in...";
      btnLoader.classList.remove("d-none");
      loginBtn.disabled = true;

      try {
        const res = await fetch("http://127.0.0.1:5000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: email.value,
            password: password.value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Login failed");
        }

        localStorage.setItem("user", JSON.stringify(data));
        window.location.replace("dashboard.html");

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
      } finally {
        btnText.textContent = "Login";
        btnLoader.classList.add("d-none");
        loginBtn.disabled = false;
      }
    });
  </script>

</body>

</html>
