<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify OTP | Rental Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --accent: #ffc107;
      --dark: #111;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url('https://images.unsplash.com/photo-1557683316-973673baf926') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Roboto, sans-serif;
    }

    .otp-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      text-align: center;
    }

    .otp-icon {
      font-size: 42px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .otp-title {
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .otp-subtitle {
      font-size: 0.95rem;
      color: #6c757d;
      margin-bottom: 25px;
    }

    .form-control {
      text-align: center;
      letter-spacing: 6px;
      font-size: 1.3rem;
      font-weight: 600;
      border-radius: 12px;
      padding: 14px;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: none;
    }

    .btn-verify {
      background: var(--accent);
      border: none;
      color: #000;
      font-weight: 700;
      padding: 12px;
      border-radius: 30px;
      width: 100%;
      margin-top: 15px;
    }

    .btn-verify:hover {
      background: #ffca2c;
    }

    .info-text {
      margin-top: 18px;
      font-size: 0.85rem;
      color: #6c757d;
    }

    .alert {
      border-radius: 10px;
      font-size: 0.85rem;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="otp-card">
    <div class="otp-icon">
      <i class="bi bi-shield-lock-fill"></i>
    </div>

    <h4 class="otp-title">Email Verification</h4>
    <p class="otp-subtitle">
      Enter the 6-digit OTP sent to your email
    </p>

    <input
      type="text"
      id="otp"
      class="form-control mb-2"
      placeholder="••••••"
      maxlength="6"
    >

    <div id="errorBox" class="alert alert-danger d-none"></div>

    <button class="btn btn-verify" onclick="verifyOtp()">
      Verify & Continue
    </button>

    <div class="info-text">
      OTP is valid for <strong>5 minutes</strong>
    </div>
  </div>

  <!-- 🔒 DO NOT CHANGE JAVASCRIPT -->
  <script>
    async function verifyOtp() {
      const otp = document.getElementById("otp").value;
      const email = sessionStorage.getItem("otp_email");
      const errorBox = document.getElementById("errorBox");

      if (!otp) {
        errorBox.textContent = "Please enter OTP";
        errorBox.classList.remove("d-none");
        return;
      }

      const res = await fetch("http://127.0.0.1:5000/verify-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp })
      });

      const data = await res.json();

      if (!res.ok) {
        errorBox.textContent = data.message;
        errorBox.classList.remove("d-none");
        return;
      }

      alert("Account verified successfully!");
      sessionStorage.removeItem("otp_email");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
