<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Properties | RMS Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
  --primary:#6366f1;
  --primary-dark:#4f46e5;
  --success:#22c55e;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

*{box-sizing:border-box;font-family:Inter,sans-serif}

body{
  margin:0;
  background:var(--bg);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#fff;
  border-right:1px solid var(--border);
  padding:26px;
  position:fixed;
  height:100vh;
}

.logo{
  display:flex;
  gap:12px;
  font-size:1.5rem;
  font-weight:800;
  color:var(--primary);
  margin-bottom:40px;
}

.nav a{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  border-radius:14px;
  text-decoration:none;
  color:var(--muted);
  font-weight:600;
  margin-bottom:8px;
  transition:.2s;
}

.nav a.active,
.nav a:hover{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
}

.logout{
  margin-top:50px;
  padding-top:20px;
  border-top:1px solid var(--border);
}

.logout button{
  background:none;
  border:none;
  color:#ef4444;
  font-weight:700;
  display:flex;
  gap:10px;
  cursor:pointer;
}

/* MAIN */
.main{
  margin-left:260px;
  padding:44px;
  width:100%;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:36px;
}

.header h1{
  margin:0;
  font-size:2.2rem;
  font-weight:800;
}

.header p{
  color:var(--muted);
}

.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:14px 26px;
  border-radius:16px;
  text-decoration:none;
  font-weight:700;
  display:flex;
  gap:10px;
  box-shadow:0 10px 25px rgba(99,102,241,.4);
}

/* SEARCH BAR */
.search{
  padding:14px 18px;
  border-radius:14px;
  border:1px solid var(--border);
  width:260px;
  font-size:.9rem;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:28px;
}

/* PROPERTY CARD */
.card{
  background:#fff;
  border-radius:22px;
  border:1px solid var(--border);
  overflow:hidden;
  transition:.25s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 30px 60px rgba(0,0,0,.15);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{
  padding:22px;
}

.card-body h4{
  margin:0 0 6px;
  font-size:1.1rem;
  font-weight:700;
}

.meta{
  color:var(--muted);
  font-size:.85rem;
  margin-bottom:14px;
}

.price{
  font-weight:800;
  font-size:1rem;
}

.badge{
  padding:6px 14px;
  border-radius:999px;
  font-size:.7rem;
  font-weight:700;
}

.available{
  background:#dcfce7;
  color:#166534;
}

.booked{
  background:#f1f5f9;
  color:#475569;
}

.card-footer{
  margin-top:18px;
}

.card-footer button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  font-weight:700;
  cursor:pointer;
}

.card-footer .book{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
}

.card-footer .disabled{
  background:#e5e7eb;
  color:#6b7280;
  cursor:not-allowed;
}
</style>
</head>

<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href="login.html";
</script>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo"><i data-lucide="key-round"></i> RMS Pro</div>

  <nav class="nav">
    <a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    <a class="active"><i data-lucide="building-2"></i> Properties</a>
    <a href="sale.html"><i data-lucide="shopping-bag"></i> My Purchases</a>
    <a href="profile.html"><i data-lucide="user"></i> Profile</a>
  </nav>

  <div class="logout">
    <button onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <div class="header">
    <div>
      <h1>Properties</h1>
      <p>Browse and manage available listings</p>
    </div>

    <div style="display:flex;gap:14px;">
      <input class="search" id="searchInput" placeholder="Search properties…">
      <a href="add-property.html" class="btn-primary">
        <i data-lucide="plus"></i> Add Property
      </a>
    </div>
  </div>

  <!-- GRID -->
  <section class="grid" id="propertyGrid"></section>

</main>

<script>
lucide.createIcons();

let allProperties=[];

async function loadProperties(){
  const res=await fetch("http://127.0.0.1:5000/properties");
  allProperties=await res.json();
  render(allProperties);
}

function render(list){
  const grid=document.getElementById("propertyGrid");
  grid.innerHTML="";

  if(!list.length){
    grid.innerHTML="<p style='color:#64748b'>No properties found</p>";
    return;
  }

  list.forEach(p=>{
    grid.innerHTML+=`
      <div class="card">
        <img src="${p.image_url}">
        <div class="card-body">
          <h4>${p.name}</h4>
          <div class="meta">${p.category} • ${p.location}</div>

          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div class="price">₹${p.price} / ${p.unit}</div>
            <span class="badge ${p.status}">${p.status.toUpperCase()}</span>
          </div>

          <div class="card-footer">
            ${
              p.status==="available"
              ? `<button class="book" onclick="bookNow(${p.id})">Book Now</button>`
              : `<button class="disabled">Already Booked</button>`
            }
          </div>
        </div>
      </div>
    `;
  });
}

document.getElementById("searchInput").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  render(allProperties.filter(p=>
    p.name.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q) ||
    p.location.toLowerCase().includes(q)
  ));
});

function bookNow(id){
  localStorage.setItem("selectedPropertyId", id);
  location.href = "booking.html";
}


function logout(){
  localStorage.clear();
  sessionStorage.clear();
  location.href="index.html";
}

loadProperties();
</script>

</body>
</html>
