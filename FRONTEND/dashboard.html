<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | RMS Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
  --primary:#6366f1;
  --primary-dark:#4f46e5;
  --success:#22c55e;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
}

*{box-sizing:border-box;font-family:Inter,sans-serif}

body{
  margin:0;
  background:var(--bg);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#fff;
  border-right:1px solid var(--border);
  padding:26px;
  position:fixed;
  height:100vh;
}

.logo{
  display:flex;
  gap:12px;
  font-size:1.5rem;
  font-weight:800;
  color:var(--primary);
  margin-bottom:40px;
}

.nav a{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  border-radius:14px;
  text-decoration:none;
  color:var(--muted);
  font-weight:600;
  margin-bottom:8px;
  transition:.2s;
}

.nav a.active,
.nav a:hover{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
}

.logout{
  margin-top:50px;
  padding-top:20px;
  border-top:1px solid var(--border);
}

.logout button{
  background:none;
  border:none;
  color:#ef4444;
  font-weight:700;
  display:flex;
  gap:10px;
  cursor:pointer;
}

/* MAIN */
.main{
  margin-left:260px;
  padding:44px;
  width:100%;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:36px;
}

.header h1{
  margin:0;
  font-size:2.2rem;
  font-weight:800;
}

.header p{
  color:var(--muted);
}

.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:14px 26px;
  border-radius:16px;
  text-decoration:none;
  font-weight:700;
  display:flex;
  gap:10px;
  box-shadow:0 10px 25px rgba(99,102,241,.4);
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:26px;
  margin-bottom:40px;
}

.stat{
  padding:26px;
  border-radius:20px;
  color:#fff;
  position:relative;
  overflow:hidden;
}

.stat::after{
  content:"";
  position:absolute;
  right:-20px;
  top:-20px;
  width:120px;
  height:120px;
  background:rgba(255,255,255,.15);
  border-radius:50%;
}

.stat h2{
  font-size:2.4rem;
  margin:8px 0;
}

.stat span{
  font-weight:600;
  opacity:.9;
}

.stat.properties{background:linear-gradient(135deg,#6366f1,#4f46e5)}
.stat.active{background:linear-gradient(135deg,#22c55e,#16a34a)}
.stat.bookings{background:linear-gradient(135deg,#0ea5e9,#0284c7)}
.stat.payments{background:linear-gradient(135deg,#f59e0b,#d97706)}

/* TABLE */
.card{
  background:#fff;
  border-radius:22px;
  border:1px solid var(--border);
  overflow:hidden;
}

.card-header{
  padding:24px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:18px 28px;
  text-align:left;
}

th{
  color:var(--muted);
  font-size:.85rem;
}

tr:hover td{
  background:#f8fafc;
}

.badge{
  padding:8px 16px;
  border-radius:999px;
  font-size:.75rem;
  font-weight:700;
}

.confirmed{
  background:#dcfce7;
  color:#166534;
}

@media(max-width:1200px){
  .stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));
if(!user) location.href="login.html";
</script>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo"><i data-lucide="key-round"></i> RMS Pro</div>

  <nav class="nav">
    <a class="active"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    <a href="properties.html"><i data-lucide="building-2"></i> Properties</a>
    <a href="sale.html"><i data-lucide="shopping-bag"></i> My Purchases</a>
    <a href="profile.html"><i data-lucide="user"></i> Profile</a>
  </nav>

  <div class="logout">
    <button onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <div class="header">
    <div>
      <h1>Welcome back, <span id="username"></span> 👋</h1>
      <p>Your rental business at a glance</p>
    </div>
    <a href="properties.html" class="btn-primary">
      <i data-lucide="plus"></i> Buy Property
    </a>
  </div>

  <!-- STATS -->
  <section class="stats">
    <div class="stat properties"><span>Total Properties</span><h2 id="totalProperties">0</h2></div>
    <div class="stat active"><span>Booked Rentals</span><h2 id="activeRentals">0</h2></div>
    <div class="stat bookings"><span>Total Bookings</span><h2 id="totalBookings">0</h2></div>
    <div class="stat payments"><span>Pending Payments</span><h2 id="pendingPayments">₹0</h2></div>
  </section>

  <!-- BOOKINGS -->
  <div class="card">
    <div class="card-header">
      <h3>Recent Bookings</h3>
      <a href="booking.html" style="color:var(--primary);font-weight:700;">View all</a>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Property</th>
          <th>Duration</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="bookingTable"></tbody>
    </table>
  </div>

</main>

<script>
lucide.createIcons();
document.getElementById("username").innerText=user.name;

async function loadDashboard(){
  const res=await fetch(`http://127.0.0.1:5000/dashboard/${user.id}`);
  const data=await res.json();

  totalProperties.innerText=data.stats.total_properties;
  activeRentals.innerText=data.stats.active_rentals;
  totalBookings.innerText=data.stats.total_bookings;
  pendingPayments.innerText="₹"+data.stats.pending_payments.toLocaleString();

  const tbody=document.getElementById("bookingTable");
  tbody.innerHTML="";

  if(!data.recent_bookings.length){
    tbody.innerHTML=`<tr><td colspan="5" style="padding:30px;text-align:center;color:#64748b">No bookings yet</td></tr>`;
    return;
  }

  data.recent_bookings.forEach(b=>{
    tbody.innerHTML+=`
      <tr>
        <td><b>BK${b.id}</b></td>
        <td>${b.name}</td>
        <td>${b.start_date} – ${b.end_date}</td>
        <td>₹${b.total_price.toLocaleString()}</td>
        <td><span class="badge confirmed">${b.status}</span></td>
      </tr>
    `;
  });
}

function logout(){
  localStorage.clear();
  sessionStorage.clear();
  location.href="index.html";
}

loadDashboard();
</script>

</body>
</html>
