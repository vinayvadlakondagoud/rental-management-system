<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Profile | RMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root{
  --primary:#6366f1;
  --primary-dark:#4f46e5;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --danger:#ef4444;
}

*{box-sizing:border-box;font-family:Inter,sans-serif}

body{
  margin:0;
  background:var(--bg);
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  background:#fff;
  border-right:1px solid var(--border);
  padding:26px;
  position:fixed;
  height:100vh;
}

.logo{
  display:flex;
  gap:12px;
  font-size:1.5rem;
  font-weight:800;
  color:var(--primary);
  margin-bottom:40px;
}

.nav a{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  border-radius:14px;
  text-decoration:none;
  color:var(--muted);
  font-weight:600;
  margin-bottom:8px;
}

.nav a.active,
.nav a:hover{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
}

.logout{
  margin-top:50px;
  padding-top:20px;
  border-top:1px solid var(--border);
}

.logout button{
  background:none;
  border:none;
  color:var(--danger);
  font-weight:700;
  display:flex;
  gap:10px;
  cursor:pointer;
}
/* ===== MAIN ===== */
.main{
  margin-left:260px;
  padding:48px;
  width:100%;
  max-width:1200px;
}

/* ===== PROFILE BANNER ===== */
.profile-banner{
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  border-radius:26px;
  padding:38px 44px;
  color:#fff;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:28px;
  align-items:center;
  box-shadow:0 25px 50px rgba(99,102,241,.35);
  margin-bottom:56px;
}

.profile-avatar{
  width:96px;
  height:96px;
  border-radius:50%;
  background:rgba(255,255,255,.2);
  border:2px solid rgba(255,255,255,.35);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.4rem;
  font-weight:900;
  color:#fff;
}

.profile-info{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.profile-name{
  font-size:3.2rem;
  font-weight:900;
  margin:0;
  line-height:1.1;
  letter-spacing:-1px;
}

.profile-subtitle{
  margin-top:12px;
  font-size:1rem;
  opacity:.9;
  font-weight:500;
}

.profile-actions{
  display:flex;
  gap:14px;
}

.profile-actions button{
  background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.35);
  color:#fff;
  padding:12px 22px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  transition:.2s;
}

.profile-actions button:hover{
  background:#fff;
  color:#4f46e5;
}

/* ===== INFO CARDS ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:28px;
  margin-bottom:44px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:22px;
  padding:26px;
}

.card span{
  color:var(--muted);
  font-size:.85rem;
}

.card h2{
  margin-top:10px;
  font-size:1.8rem;
}

/* ===== FORM CARD ===== */
.section{
  background:#fff;
  border:1px solid var(--border);
  border-radius:22px;
  margin-bottom:36px;
}

.section-header{
  padding:22px 28px;
  border-bottom:1px solid var(--border);
  font-weight:800;
}

.section-body{
  padding:28px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  width: 100%;
}
.section-body > div {
  display: flex;
  flex-direction: column;
}



label{
  font-size:.8rem;
  font-weight:700;
  color:var(--muted);
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-top:8px;
}

input:disabled{
  background:#f1f5f9;
}

/* ===== BUTTONS ===== */
.primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;
  border:none;
  padding:14px 26px;
  border-radius:16px;
  font-weight:800;
  cursor:pointer;
}

.danger{
  background:#fee2e2;
  color:#991b1b;
  border:none;
  padding:16px;
  border-radius:16px;
  font-weight:800;
  cursor:pointer;
  width:205%;
}
</style>
</head>

<body>

  
<script>
const raw = localStorage.getItem("user");
const user = raw ? JSON.parse(raw) : null;
if(!user) location.href="login.html";
</script>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo"><i data-lucide="key-round"></i> RMS</div>

  <nav class="nav">
    <a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    <a href="properties.html"><i data-lucide="building-2"></i> Properties</a>
    <a href="sale.html"><i data-lucide="shopping-bag"></i> My Purchases</a>
    <a class="active"><i data-lucide="user"></i> Profile</a>
  </nav>

  <div class="logout">
    <button onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- BANNER -->
  <section class="profile-banner">
    <div class="profile-avatar" id="avatar"></div>

    <div class="profile-info">
      <h1 class="profile-name"><span id="name"></span></h1>
      <p class="profile-subtitle">
        Welcome back 👋 Manage your account details and security
      </p>
    </div>

    <div class="profile-actions">
      <button onclick="location.href='dashboard.html'">
        <i data-lucide="layout-dashboard"></i> Dashboard
      </button>
    </div>
  </section>

  <!-- OVERVIEW
  <section class="cards">
    <div class="card">
      <span>Account Type</span>
      <h2>Standard User</h2>
    </div>
    <div class="card">
      <span>Security Level</span>
      <h2>Medium</h2>
    </div>
    <div class="card">
      <span>Last Login</span>
      <h2>Today</h2>
    </div>
  </section> -->

  <!-- PERSONAL INFO -->
  <div class="section">
    <div class="section-header">Personal Information</div>
    <div class="section-body">
      <div>
        <label>Full Name</label>
        <input id="fullName" disabled>
      </div>
      <div>
        <label>Email Address</label>
        <input id="emailField" disabled>
      </div>
    </div>
  </div>

  <!-- SECURITY -->
  <div class="section">
    <div class="section-header">Security</div>
    <div class="section-body">
      <div>
        <label>Current Password</label>
        <input type="password" id="currentPwd">
      </div>
      <div>
        <label>New Password</label>
        <input type="password" id="newPwd">
      </div>
      <div style="grid-column:1/-1">
        <button class="primary" onclick="updatePassword()">Update Password</button>
      </div>
    </div>
  </div>

  <!-- DANGER -->
  <div class="section">
    <div class="section-header" style="color:var(--danger)">Danger Zone</div>
    <div class="section-body">
      <button class="danger" onclick="deleteAccount()">Delete Account</button>
    </div>
  </div>

</main>

<script>
lucide.createIcons();

/* SET USER DATA */
avatar.innerText = user.name.charAt(0).toUpperCase();
name.innerText = user.name;
fullName.value = user.name;
emailField.value = user.email;

/* ACTIONS */
async function updatePassword(){
  if(!currentPwd.value || !newPwd.value){
    alert("Fill all password fields");
    return;
  }

  const res = await fetch("http://127.0.0.1:5000/change-password",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      user_id:user.id,
      current:currentPwd.value,
      new:newPwd.value
    })
  });

  const data = await res.json();
  if(!res.ok){ alert(data.message); return; }

  alert("Password updated successfully");
  currentPwd.value="";
  newPwd.value="";
}

async function deleteAccount(){
  if(!confirm("This action is irreversible. Delete account?")) return;
  await fetch(`http://127.0.0.1:5000/delete-account/${user.id}`,{ method:"DELETE" });
  localStorage.clear();
  location.href="login.html";
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>

</body>
</html>
